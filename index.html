<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeHub</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="container">

        <h1 class="logo">MemeHub</h1>

        <p class="subtitle">
            Discover, create and customize memes in seconds
        </p>

        <input
            type="text"
            id="searchInput"
            placeholder="Search meme templates..."
        >

        <h2>Trending Templates</h2>

        <div id="templates" class="template-grid"></div>

        <div class="upload-section">

            <button id="uploadBtn">
                Upload Your Image
            </button>

            <input
                type="file"
                id="imageUpload"
                accept="image/*"
                hidden
            >

        </div>

    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
