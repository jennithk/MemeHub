<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeHub Editor</title>
    <link rel="stylesheet" href="css/editor.css">
</head>
<body>

    <main class="editor-container">

        <a href="index.html" class="back-btn">
            ← Back
        </a>

        <h1>Meme Editor</h1>

        <div class="meme-preview">
            <canvas id="memeCanvas"></canvas>
        </div>

        <div class="controls">

            <button id="addTextBtn">
                + Add Text
            </button>

            <input
                type="text"
                id="textInput"
                placeholder="Edit selected text"
            >

            <label for="fontSize">
                Font Size
            </label>

            <input
                type="range"
                id="fontSize"
                min="20"
                max="100"
                value="40"
            >

            <label for="textColor">
                Text Color
            </label>

            <input
                type="color"
                id="textColor"
                value="#ffffff"
            >

            <label for="outlineColor">
                Outline Color
            </label>

            <input
                type="color"
                id="outlineColor"
                value="#000000"
            >

            <label for="fontFamily">
                Font Family
            </label>

            <select id="fontFamily">
                <option value="Arial">Arial</option>
                <option value="Impact">Impact</option>
                <option value="Verdana">Verdana</option>
                <option value="Tahoma">Tahoma</option>
                <option value="Courier New">Courier New</option>
            </select>

            <button id="deleteTextBtn">
                Delete Selected Text
            </button>

            <button id="downloadBtn">
                Download Meme
            </button>

        </div>

    </main>

    <script src="js/editor.js"></script>

</body>
</html>
